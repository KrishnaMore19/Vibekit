[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  functions = "netlify/functions"
  targetPort = 5173
  framework = "#custom"

# ── Contact form — must come BEFORE the generic /api/* catch-all ──────────────
# Netlify evaluates redirects top-to-bottom; first match wins.
[[redirects]]
  from = "/api/public/pages/*/contact"
  to = "/.netlify/functions/contact-submit"
  status = 200

# ── All other API routes → main serverless function ───────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# ── SPA fallback routes ───────────────────────────────────────────────────────
[[redirects]]
  from = "/p/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]